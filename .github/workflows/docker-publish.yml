name: 🐳 Docker Publish

on:
  push:
    branches:
      - main
      - stable
    tags:
      - "v*"
      - "stable"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # main branch → latest
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # stable branch or stable tag → stable + latest
            type=raw,value=stable,enable=${{ github.ref == 'refs/heads/stable' || github.ref == 'refs/tags/stable' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/stable' || github.ref == 'refs/tags/stable' }}
            # version tags (v1.2.3) → semver variants
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=Kōan
            org.opencontainers.image.description=Autonomous background agent using idle Claude API quota
            org.opencontainers.image.url=https://github.com/${{ github.repository }}

      - name: 🐳 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
