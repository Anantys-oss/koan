name: 🚀 Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.5, v1.0.0)"
        required: true
        type: string
      update_stable:
        description: "Update the 'stable' tag to point to this release"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: release

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 🔍 Refuse to release from main
        run: |
          # main is the unstable integration branch: it may contain commits not
          # yet validated by an incubate pass nor documented in the changelog.
          # Releases are cut from incubating (or the stable branch derived from it).
          case "${{ github.ref_name }}" in
            incubating|stable) ;;
            *)
              echo "::error::Releases must be dispatched on 'incubating' or 'stable', not '${{ github.ref_name }}'. main is the unstable integration branch."
              exit 1
              ;;
          esac

      - name: 🔍 Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^v[0-9]+(\.[0-9]+){1,2}$'; then
            echo "::error::Version must match vMAJOR.MINOR or vMAJOR.MINOR.PATCH (e.g. v0.5, v1.0.0)"
            exit 1
          fi

      - name: 🔍 Check tag does not already exist
        run: |
          if git rev-parse "${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ inputs.version }} already exists"
            exit 1
          fi

      - name: 📝 Check for commits since last tag
        run: |
          LAST_TAG=$(git tag --sort=-v:refname --list 'v*' | head -1)
          if [ -n "$LAST_TAG" ]; then
            COMMIT_COUNT=$(git rev-list --count "${LAST_TAG}..HEAD")
            if [ "$COMMIT_COUNT" -eq 0 ]; then
              echo "::error::No commits since $LAST_TAG — nothing to release"
              exit 1
            fi
          fi

      - name: 📝 Extract release notes from changes/stable.md
        env:
          VERSION: ${{ inputs.version }}
        run: |
          # The curated changelog is rolled into changes/stable.md by /koan.release
          # before this workflow is dispatched. Releasing without it is a process
          # error, so the absence of the section is fatal — never fall back to a
          # raw git log.
          if [ ! -f changes/stable.md ]; then
            echo "::error::changes/stable.md not found — run /koan.release to roll the changelog before dispatching this workflow"
            exit 1
          fi
          awk -v ver="$VERSION" '
            $0 ~ "^## " ver " " || $0 ~ "^## " ver "$" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' changes/stable.md > /tmp/release-notes.md
          if ! grep -q '[^[:space:]]' /tmp/release-notes.md; then
            echo "::error::No '## $VERSION' section found in changes/stable.md — run /koan.release to roll the changelog first"
            exit 1
          fi

      - name: 🏷️ Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - name: 🏷️ Update stable tag
        if: inputs.update_stable
        run: |
          echo "Updating stable tag → ${{ inputs.version }}"
          git tag -f stable "${{ inputs.version }}"
          git push origin stable --force

      - name: 🚀 Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.version }}" \
            --title "Kōan ${{ inputs.version }}" \
            --notes-file /tmp/release-notes.md \
            --latest

  publish-image:
    needs: release
    uses: ./.github/workflows/docker-publish.yml
    with:
      tags: |
        type=semver,pattern={{version}},value=${{ inputs.version }}
        type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }}
        type=raw,value=latest
        type=raw,value=stable,enable=${{ inputs.update_stable }}
    secrets: inherit
