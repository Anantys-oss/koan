name: 🔒 Container Build (internal)

# Internal reusable worker (workflow_call only) — not directly runnable.
# Called by 🐳 Publish Container and 🚀 Release to build + push the GHCR image.

on:
  workflow_call:
    inputs:
      tags:
        description: "docker/metadata-action tags block (newline-separated tag rules)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: publish

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1   # metadata uses the passed tags block, not git tags — shallow is fine

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔑 Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: ${{ inputs.tags }}

      - name: 🐳 Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
